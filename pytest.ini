[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Allure: куда складывать сырые результаты.
# --clean-alluredir намеренно НЕ здесь: при запуске с pytest-xdist (-n)
# воркеры чистят каталог одновременно и ловят гонку (FileNotFoundError).
# Чистите каталог сами перед прогоном или флагом --clean-alluredir в один поток.
addopts =
    -ra
    -v
    --alluredir=allure-results
    --output=test-results
    --tracing=retain-on-failure
    --screenshot=only-on-failure
    --video=retain-on-failure

markers =
    ui: UI-тесты на Playwright
    api: API-тесты на requests
