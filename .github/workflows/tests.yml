name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# нужно, чтобы токен мог пушить отчёт в ветку gh-pages
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      UI_BASE_URL: https://demoqa.com
      API_BASE_URL: https://fakestoreapi.com

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run tests
        run: pytest -n auto

      - name: Upload failure artifacts (trace / screenshot / video)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore

      # ---- Allure report → GitHub Pages (нативный CLI, без Docker-экшена) ----
      - name: Load Allure history
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/checkout@v5
        continue-on-error: true        # на первом прогоне ветки gh-pages ещё нет
        with:
          ref: gh-pages
          path: gh-pages

      - name: Restore history into results
        if: always() && github.ref == 'refs/heads/main'
        run: |
          mkdir -p allure-results
          if [ -d gh-pages/history ]; then
            cp -r gh-pages/history allure-results/history
          fi

      - name: Install Allure CLI
        if: always() && github.ref == 'refs/heads/main'
        run: npm install -g allure-commandline

      - name: Generate Allure report
        if: always() && github.ref == 'refs/heads/main'
        run: allure generate allure-results --clean -o allure-report

      - name: Publish report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
